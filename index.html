<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Breach (Safe Prank with Random Meme)</title>
<style>
  body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ff00;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #message {
    font-size: 22px;
    text-align: center;
  }

  #cameraScreen {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    overflow: hidden;
  }

  #videoPlaceholder {
    width: 100%;
    height: 100%;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #555;
    font-size: 40px;
  }

  .face-box {
    position: absolute;
    border: 2px solid red;
    width: 100px;
    height: 100px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: moveBox 2s infinite alternate;
  }

  @keyframes moveBox {
    0% { transform: translate(-50%, -50%) translate(0,0); }
    50% { transform: translate(-50%, -50%) translate(30px, -20px); }
    100% { transform: translate(-50%, -50%) translate(-30px, 20px); }
  }

  #flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
  }

  #rec {
    position: absolute;
    top: 20px;
    left: 20px;
    color: red;
    font-size: 18px;
  }

  #timer {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 18px;
  }

  #funnyImage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 50%;
    max-height: 50%;
    display: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="message">Initializing system...</div>

<div id="cameraScreen">
  <div id="videoPlaceholder">Camera Feed</div>
  <div class="face-box"></div>
  <div id="rec">REC</div>
  <div id="timer">00:00</div>
  <div id="flash"></div>
  <img id="funnyImage" src="" alt="Funny Meme">
</div>

<script>
let msg = document.getElementById("message");
let camScreen = document.getElementById("cameraScreen");
let timerEl = document.getElementById("timer");
let flash = document.getElementById("flash");
let funnyImage = document.getElementById("funnyImage");

let seconds = 0;

// List of funny images
const memes = [
  "https://i.imgur.com/4AiXzf8.jpeg",
  "https://i.imgur.com/J6qX7eK.jpeg",
  "https://i.imgur.com/Bn6QKfW.jpeg",
  "https://i.imgur.com/N0p1QfJ.jpeg",
  "https://i.imgur.com/8Q0cP2V.jpeg"
];

// Fake timer
function startTimer() {
  setInterval(() => {
    seconds++;
    let min = String(Math.floor(seconds / 60)).padStart(2,'0');
    let sec = String(seconds % 60).padStart(2,'0');
    timerEl.textContent = min + ":" + sec;
  }, 1000);
}

// Flash effect + random meme
function flashEffect() {
  flash.style.opacity = 1;
  setTimeout(() => { flash.style.opacity = 0; }, 100);

  // Pick a random meme
  const randomMeme = memes[Math.floor(Math.random() * memes.length)];
  funnyImage.src = randomMeme;
  funnyImage.style.display = "block";

  setTimeout(() => { funnyImage.style.display = "none"; }, 2000);
}

// Start fake camera prank
function startFakeCamera() {
  camScreen.style.display = "block";
  msg.style.display = "none";
  startTimer();

  // Simulate flash + random meme after 3 seconds
  setTimeout(() => { flashEffect(); }, 3000);

  // End prank after 7 seconds
  setTimeout(() => {
    camScreen.style.display = "none";
    document.body.style.background = "white";
    msg.style.display = "block";
    msg.style.color = "black";
    msg.innerHTML = "😂 APRIL FOOL! 😂😂";
  }, 7000);
}

// Sequence of messages
setTimeout(() => { msg.textContent = "Accessing camera..."; }, 1500);
setTimeout(() => { msg.textContent = "Camera access granted!"; }, 3000);
setTimeout(() => { startFakeCamera(); }, 4500);
</script>
</body>
</html>
